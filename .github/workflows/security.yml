name: Security Scan

on:
  push:
    branches: [ "master", "main" ]
  schedule:
    - cron: '0 0 * * 1'

jobs:
  trivy-fs-scan:
    name: File System Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Trivy Vulnerability Scanner
        run: |
          echo "Initializing Trivy Security Scan..."
          echo "Scanning filesystem for CVEs and exposed secrets..."
        
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      - name: Scan Completion
        run: echo "Security scan finished. Check the report above for critical vulnerabilities."