name: Continuous Integration

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './src/package-lock.json'

      - name: Install Dependencies
        working-directory: ./src
        run: |
          echo "Starting dependency installation..."
          npm ci
          echo "All dependencies installed successfully."

      - name: Run Linting
        run: |
          echo "Running ESLint to check code quality..."
          make lint
          echo "Code quality checks passed."

      - name: Start Application in Background
        run: |
          echo "Booting up the server for testing..."
          # The '&' at the end tells Linux to run this process in the background!
          make run &
          # Wait 5 seconds to ensure the server is fully started
          sleep 5 

      - name: Run Integration Tests
        run: |
          echo "Executing HTTP integration tests..."
          make test
          echo "All tests passed! Code is stable."
